{% extends 'core/base.html' %}

{% block extra_css %}
<style>
/* Delete Modal Styles */
.delete-modal {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  display: flex;
  align-items: center;
  justify-content: center;
  background: rgba(0, 0, 0, 0.6);
  backdrop-filter: blur(8px);
  z-index: 1000;
  animation: fadeIn 0.3s ease;
}

.delete-container {
  background: rgba(255, 255, 255, 0.95);
  backdrop-filter: blur(15px);
  border-radius: 16px;
  padding: 32px;
  max-width: 450px;
  width: 90%;
  box-shadow:
    0 20px 40px rgba(0,0,0,0.3),
    inset 0 1px 0 rgba(255,255,255,0.4);
  border: 1px solid rgba(255,255,255,0.3);
  animation: slideUp 0.4s ease;
}

.delete-header {
  text-align: center;
  margin-bottom: 24px;
}

.delete-icon {
  width: 64px;
  height: 64px;
  background: linear-gradient(135deg, #ef4444, #dc2626);
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  margin: 0 auto 16px;
  box-shadow: 0 8px 20px rgba(239, 68, 68, 0.3);
}

.delete-icon i {
  font-size: 28px;
  color: white;
}

.delete-title {
  font-family: 'Poppins', sans-serif;
  font-size: 24px;
  font-weight: 600;
  color: #1f2937;
  margin: 0 0 8px 0;
}

.delete-message {
  color: #6b7280;
  font-size: 16px;
  line-height: 1.5;
  margin: 0;
}

.delete-actions {
  display: flex;
  gap: 12px;
  margin-top: 32px;
}

.btn-delete {
  flex: 1;
  background: linear-gradient(135deg, #ef4444, #dc2626);
  color: white;
  border: none;
  padding: 12px 24px;
  border-radius: 8px;
  font-weight: 500;
  cursor: pointer;
  transition: all 0.2s ease;
  box-shadow: 0 4px 12px rgba(239, 68, 68, 0.3);
}

.btn-delete:hover {
  background: linear-gradient(135deg, #dc2626, #b91c1c);
  transform: translateY(-1px);
  box-shadow: 0 6px 16px rgba(239, 68, 68, 0.4);
}

.btn-cancel {
  flex: 1;
  background: #f3f4f6;
  color: #374151;
  border: 1px solid #d1d5db;
  padding: 12px 24px;
  border-radius: 8px;
  font-weight: 500;
  cursor: pointer;
  transition: all 0.2s ease;
}

.btn-cancel:hover {
  background: #e5e7eb;
  border-color: #9ca3af;
}

@keyframes fadeIn {
  from { opacity: 0; }
  to { opacity: 1; }
}

@keyframes slideUp {
  from {
    opacity: 0;
    transform: translateY(20px) scale(0.95);
  }
  to {
    opacity: 1;
    transform: translateY(0) scale(1);
  }
}
</style>
{% endblock %}

{% block content %}
<div class="delete-modal">
  <div class="delete-container">
    <div class="delete-header">
      <div class="delete-icon">
        <i class="ri-delete-bin-6-line"></i>
      </div>
      <h1 class="delete-title">Delete Project</h1>
      <p class="delete-message">
        Are you sure you want to delete <strong>"{{ project.name }}"</strong>?
        This action cannot be undone and will permanently remove the project and all its tasks.
      </p>
    </div>

    <div class="delete-actions">
      <a href="{% url 'core:projects' %}" class="btn-cancel">Cancel</a>
      <form method="POST" style="flex: 1;">
        {% csrf_token %}
        <button type="submit" class="btn-delete">
          <i class="ri-delete-bin-6-line" style="margin-right: 8px;"></i>
          Delete Project
        </button>
      </form>
    </div>
  </div>
</div>
{% endblock %}
