{% extends 'core/base.html' %}

{% block content %}

<h2>User Dashboard</h2>

<div class="task-container">
  {% for task in tasks %}
    <div class="task-card">
      <h3>{{ task.title }}</h3>
      <p>Status: {{ task.status }}</p>
    </div>
  {% empty %}
    <p>No tasks assigned</p>
  {% endfor %}
</div>

{% endblock %}
