{% extends 'core/base.html' %}
{% block extra_css %}

<style>
/* SAME STYLE REUSED */
.cp-wrap {
  min-height: 100vh;
  display:flex;
  align-items:center;
  justify-content:center;
  background:#f6f8fb;
  padding:20px;
}

.cp-card {
  width:100%;
  max-width:500px;
  background:#fff;
  padding:28px;
  border-radius:16px;
  box-shadow:0 10px 30px rgba(0,0,0,0.06);
  border:1px solid #eef1f6;
}

.cp-title {
  font-size:20px;
  font-weight:600;
  margin-bottom:20px;
  color:#1f2937;
}

.cp-form-group {
  margin-bottom:16px;
}

.cp-form-group label {
  display:block;
  font-size:12px;
  font-weight:500;
  color:#555;
  margin-bottom:6px;
}

.cp-form-group input,
.cp-form-group textarea {
  width:100%;
  padding:10px;
  border-radius:8px;
  border:1px solid #ddd;
  font-size:13px;
  transition:0.2s;
}

.cp-form-group input:focus,
.cp-form-group textarea:focus {
  border-color:#1677ff;
  outline:none;
  box-shadow:0 0 0 2px rgba(22,119,255,0.1);
}

.cp-form-group textarea {
  min-height:90px;
}

.cp-actions {
  display:flex;
  justify-content:flex-end;
  gap:10px;
  margin-top:20px;
}

.cp-btn {
  padding:10px 16px;
  border-radius:8px;
  font-size:13px;
  border:none;
  cursor:pointer;
}

.cp-btn-primary {
  background:#1677ff;
  color:#fff;
}

.cp-btn-primary:hover {
  background:#0f5ed7;
}

.cp-btn-secondary {
  background:#f5f5f5;
}

.cp-btn-secondary:hover {
  background:#e5e5e5;
}
</style>

{% endblock %}

{% block content %}

<div class="cp-wrap">

  <div class="cp-card">
    <div class="cp-title">Edit Project</div>

    <form method="POST">
      {% csrf_token %}

      <div class="cp-form-group">
        <label>Project Name</label>
        <input type="text" name="name" value="{{ project.name }}" required>
      </div>

      <div class="cp-form-group">
        <label>Description</label>
        <textarea name="description">{{ project.description }}</textarea>
      </div>

      <div class="cp-actions">
        <a href="{% url 'core:project_list' %}" class="cp-btn cp-btn-secondary">Cancel</a>
        <button type="submit" class="cp-btn cp-btn-primary">Update Project</button>
      </div>

    </form>
  </div>

</div>

{% endblock %}
