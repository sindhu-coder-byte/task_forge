<div style="font-family: Arial, sans-serif; background:#f4f5f7; padding:20px;">
  <div style="max-width:500px;margin:auto;background:#fff;border-radius:10px;padding:20px;border:1px solid #e5e7eb;">

    <h2 style="color:#172b4d;margin-bottom:10px;">
      You're invited to {{ project.name }}
    </h2>

    <p style="color:#44546f;font-size:14px;">
      <strong>{{ inviter.username }}</strong> invited you to collaborate on a project.
    </p>

    <p style="font-size:14px;">
      Role: <strong style="color:#0052cc;">{{ role|title }}</strong>
    </p>

    <div style="margin:20px 0;text-align:center;">
      <a href="{{ accept_url }}"
         style="background:#0052cc;color:#fff;padding:10px 18px;border-radius:6px;
                text-decoration:none;font-size:14px;display:inline-block;">
        Accept Invitation
      </a>
    </div>

    <p style="font-size:12px;color:#6b7280;">
      This invite will expire in 3 days.
    </p>

    <hr style="margin:20px 0;border:none;border-top:1px solid #eee;">

    <p style="font-size:12px;color:#9aa4b2;">
      If you didn’t expect this, you can ignore this email.
    </p>

  </div>
</div>
